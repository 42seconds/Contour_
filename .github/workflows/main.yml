name: Android CI

# This decides WHEN the workflow runs.
# Here: every time you push to "main", and every time a pull request targets "main".
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # Runs on a fresh Ubuntu virtual machine provided by GitHub
    runs-on: ubuntu-latest

    steps:
      # 1. Download your repo's code onto the virtual machine
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install Java — Android/Gradle builds require a JDK.
      #    Temurin 17 is the standard choice for current Android Gradle Plugin versions.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Make gradlew executable (Linux runners need this explicitly;
      #    your Mac/Windows machine doesn't need this step, but Linux does)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Run unit tests
      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      # 5. Build the debug APK
      - name: Build debug APK
        run: ./gradlew assembleDebug

      # 6. Upload the APK so you can download it from the GitHub Actions run page
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
      # 7.
      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace
